<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mening Saytim</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    scroll-behavior: smooth;
}

/* ORQA FON */
section {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
}

/* 1-SAHIFA */
#home {
    background-image: url('https://images.unsplash.com/photo-1502920917128-1aa500764cbd');
background-size: cover;
background-position: center;
background-attachment: fixed;
   
}

/* QORA BLOK */
.box {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 15px;
}

/* 2-SAHIFA */
#form {
    background: #111;
}

/* FORM */
.form-box {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 280px;
}

input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #00ffcc;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #00ccaa;
}

</style>
</head>

<body>

<!-- 1-SAHIFA -->
<section id="home">
    <div class="box">
        <h1>🚀 Xush kelibsiz. Shox sertifikat sizning xizmatingizda!!</h1>
        <p>Assalomu aleykum sizga rus tilidan sertifikat kerakmi. Iltimos arizani toldiring bizni ozimiz sizga aloqaga chiqamiz</p>
        <div>📞 +998 90 478 28 07 </div>
    </div>
</section>

<!-- 2-SAHIFA -->
<section id="form">
    <h2>📄 Ariza to‘ldirish</h2>

    <form class="form-box">
        <input type="text" placeholder="Ism" required>
        <input type="text" placeholder="Familiya" required>
        <input type="tel" placeholder="Telefon raqam" required>
        <select required>
    <option value="">Rus tili darajangizni tanlang</option>
    <option value="0">Umuman bilmayman</option>
    <option value="1">Ozgina bilaman</option>
    <option value="2">Yaxshi bilaman</option>
</select>

        <label>📅 Ketish sanasi</label>
        <input type="date" required>

        <button type="submit">Yuborish</button>
    </form>
</section>

</body>
</html>
