<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Saytim</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            
            /* Orqa fon rasmi */
            background-image: url('https://images.unsplash.com/photo-1503264116251-35a269479413');
            background-size: cover;
            background-position: center;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }.form-box {
    display: flex;
    flex-direction: column;
    gap: 12px;

}

.form-box input {

    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 14px;
}

.form-box label {
    color: white;
    font-size: 14px;
    margin-top: 5px;
}

button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #00ffcc;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00ccaa;
}

        .box {
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 15px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
        }

        .phone {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #00ffcc;
        }
    </style>

</head>

    <div class="box">

        <div class="phone">

        </div>
    </div>
